<!DOCTYPE html>
<html>
<head><style>
  body { background:#111; display:flex; gap:40px; align-items:center; justify-content:center; height:100vh; margin:0; flex-wrap:wrap; }
  .box { display:flex; flex-direction:column; align-items:center; gap:12px; }
  label { color:#888; font:12px sans-serif; }
</style></head>
<body>

<!-- White on dark (nav/sidebar use case) -->
<div class="box">
  <svg width="80" height="103" viewBox="0 0 300 385" xmlns="http://www.w3.org/2000/svg" fill="white">
    <path d="M50,33 C118,3 186,3 254,85 C186,135 118,135 50,33Z"/>
    <path d="M0,70 C100,125 200,125 300,267 C200,347 100,347 0,70Z"/>
    <path d="M11,309 C79,279 147,279 215,368 C147,397 79,397 11,309Z"/>
  </svg>
  <label>White / small</label>
</div>

<!-- Black on white (original logo colours) -->
<div class="box" style="background:white; padding:30px; border-radius:16px;">
  <svg width="120" height="154" viewBox="0 0 300 385" xmlns="http://www.w3.org/2000/svg" fill="black">
    <path d="M50,33 C118,3 186,3 254,85 C186,135 118,135 50,33Z"/>
    <path d="M0,70 C100,125 200,125 300,267 C200,347 100,347 0,70Z"/>
    <path d="M11,309 C79,279 147,279 215,368 C147,397 79,397 11,309Z"/>
  </svg>
  <label style="color:#555;">Black / medium</label>
</div>

<!-- Purple rounded square (favicon style) -->
<div class="box">
  <svg width="80" height="80" viewBox="0 0 300 385" xmlns="http://www.w3.org/2000/svg">
    <rect width="300" height="385" rx="55" fill="#7C3AED"/>
    <path fill="white" d="M50,33 C118,3 186,3 254,85 C186,135 118,135 50,33Z M0,70 C100,125 200,125 300,267 C200,347 100,347 0,70Z M11,309 C79,279 147,279 215,368 C147,397 79,397 11,309Z"/>
  </svg>
  <label>Purple / square</label>
</div>

<!-- Large white for comparison -->
<div class="box">
  <svg width="160" height="205" viewBox="0 0 300 385" xmlns="http://www.w3.org/2000/svg" fill="white">
    <path d="M50,33 C118,3 186,3 254,85 C186,135 118,135 50,33Z"/>
    <path d="M0,70 C100,125 200,125 300,267 C200,347 100,347 0,70Z"/>
    <path d="M11,309 C79,279 147,279 215,368 C147,397 79,397 11,309Z"/>
  </svg>
  <label>White / large</label>
</div>

</body>
</html>
